<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塔罗牌图片生成器</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);

      padding: 20px;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      color: #D4AF37;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #F0D68A;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .controls {
      text-align: center;
      margin-bottom: 30px;
    }
    button {
      background: linear-gradient(135deg, #D4AF37, #F0D68A);
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 10px;
      transition: all 0.3s ease;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .progress-container {
      max-width: 600px;
      margin: 20px auto;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 8px;
      padding: 15px;
    }
    .progress-text {
      color: #F0D68A;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #F0D68A);
      width: 0%;
      transition: width 0.3s ease;
    }
    .cards-container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      padding: 20px;
    }
    .card-item {
      background: rgba(212, 175, 55, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .card-item:hover {
      border-color: rgba(212, 175, 55, 0.5);
      transform: translateY(-5px);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2);
    }
    .card-item img {
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    .card-name {
      margin-top: 8px;
      font-size: 12px;
      color: #D4AF37;
    }
    .info-box {
      max-width: 800px;
      margin: 20px auto;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 8px;
      padding: 20px;
      line-height: 1.8;
    }
    .info-box h3 {
      color: #F0D68A;
      margin-top: 0;
    }
    .tabs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 8px 16px;
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 6px;
      color: #D4AF37;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: rgba(212, 175, 55, 0.3);
      border-color: #D4AF37;
    }
  </style>
</head>
<body>

  <p class="subtitle">生成穆夏风格塔罗牌占位符图片</p>

  <div class="info-box">
    <h3>📝 使用说明</h3>
    <p><strong>方案A：使用占位符（快速）</strong></p>
    <p>点击"生成所有牌面"，会生成SVG格式的占位符图片（包含牌名、编号、装饰边框）。</p>
    <p><strong>方案B：使用AI生成（推荐）</strong></p>
    <p>1. 打开 <code>mucha-prompts.md</code> 文件（已自动创建）</p>
    <p>2. 复制提示词到 MidJourney / DALL-E / Stable Diffusion</p>
    <p>3. 生成后下载图片，放到 <code>icons/</code> 文件夹</p>
    <p>4. 重命名图片为对应的 <code>imageUrl</code> 路径</p>
  </div>

    <button onclick="generateSelectedSuit('cups')">圣杯</button>
    <button onclick="generateSelectedSuit('swords')">宝剑</button>
    <button onclick="generateSelectedSuit('pentacles')">星币</button>
  </div>

    <div class="progress-text" id="progressText">准备中...</div>
    <div class="progress-bar">

      { id: "pentacles-03", name: "星币三", nameEn: "Three of Pentacles", suit: "pentacles" },
      { id: "pentacles-04", name: "星币四", nameEn: "Four of Pentacles", suit: "pentacles" },
      { id: "pentacles-05", name: "星币五", nameEn: "Five of Pentacles", suit: "pentacles" },
      { id: "pentacles-06", name: "星币六", nameEn: "Six of Pentacles", suit: "pentacles" },
      { id: "pentacles-07", name: "星币七", nameEn: "Seven of Pentacles", suit: "pentacles" },
      { id: "pentacles-08", name: "星币八", nameEn: "Eight of Pentacles", suit: "pentacles" },
      { id: "pentacles-09", name: "星币九", nameEn: "Nine of Pentacles", suit: "pentacles" },
      { id: "pentacles-10", name: "星币十", nameEn: "Ten of Pentacles", suit: "pentacles" },
      { id: "pentacles-11", name: "星币侍从", nameEn: "Page of Pentacles", suit: "pentacles" },
      { id: "pentacles-12", name: "星币骑士", nameEn: "Knight of Pentacles", suit: "pentacles" },
      { id: "pentacles-13", name: "星币王后", nameEn: "Queen of Pentacles", suit: "pentacles" },
      { id: "pentacles-14", name: "星币国王", nameEn: "King of Pentacles", suit: "pentacles" }
    ];

    // 花色颜色映射
    const suitColors = {
      major: { primary: '#D4AF37', secondary: '#F0D68A', bg: '#1a1a2e' },
      wands: { primary: '#EF4444', secondary: '#FCA5A5', bg: '#2d1a1a' },
      cups: { primary: '#3B82F6', secondary: '#93C5FD', bg: '#1a1a2d' },
      swords: { primary: '#F59E0B', secondary: '#FCD34D', bg: '#2d2a1a' },
      pentacles: { primary: '#10B981', secondary: '#6EE7B7', bg: '#1a2d1a' }
    };

    // 花色符号
    const suitSymbols = {
      major: '★',
      wands: '🔥',
      cups: '💧',
      swords: '💨',
      pentacles: '🌍'
    };

    // 存储生成的图片
    let generatedCards = {};

    // 生成穆夏风格SVG
    function generateMuchaSVG(card) {
      const colors = suitColors[card.suit] || suitColors.major;
      const width = 300;
      const height = 500;
      const suitSymbol = suitSymbols[card.suit] || '★';

      // 简化版SVG（避免引号问题）
      const svg = [
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<svg width="' + width + '" height="' + height + '" xmlns="http://www.w3.org/2000/svg">',
        '<defs>',
        '<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">',
        '<stop offset="0%" style="stop-color:' + colors.bg + ';stop-opacity:1" />',
        '<stop offset="100%" style="stop-color:' + colors.primary + ';stop-opacity:0.3" />',
        '</linearGradient>',
        '<pattern id="pattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">',
        '<circle cx="10" cy="10" r="1" fill="' + colors.secondary + '" opacity="0.3"/>',
        '</pattern>',
        '</defs>',
        '<rect width="' + width + '" height="' + height + '" fill="url(#bg)" rx="15"/>',
        '<rect width="' + width + '" height="' + height + '" fill="url(#pattern)" rx="15"/>',
        '<rect x="15" y="15" width="' + (width-30) + '" height="' + (height-30) + '" rx="10" fill="none" stroke="' + colors.primary + '" stroke-width="2" opacity="0.6"/>',
        '<rect x="25" y="25" width="' + (width-50) + '" height="' + (height-50) + '" rx="8" fill="none" stroke="' + colors.secondary + '" stroke-width="1" opacity="0.4"/>',
        '<circle cx="40" cy="40" r="6" fill="' + colors.primary + '" opacity="0.5"/>',
        '<circle cx="' + (width-40) + '" cy="40" r="6" fill="' + colors.primary + '" opacity="0.5"/>',
        '<circle cx="40" cy="' + (height-40) + '" r="6" fill="' + colors.primary + '" opacity="0.5"/>',
        '<circle cx="' + (width-40) + '" cy="' + (height-40) + '" r="6" fill="' + colors.primary + '" opacity="0.5"/>',
        '<text x="' + (width/2) + '" y="' + (height/2 - 30) + '" font-size="80" text-anchor="middle" fill="' + colors.primary + '" opacity="0.3" font-family="serif">' + suitSymbol + '</text>',
        '<text x="' + (width/2) + '" y="' + (height/2 + 30) + '" font-size="24" text-anchor="middle" fill="' + colors.primary + '" font-family="serif" font-weight="bold">' + card.name + '</text>',
        '<text x="' + (width/2) + '" y="' + (height/2 + 60) + '" font-size="14" text-anchor="middle" fill="' + colors.secondary + '" font-family="serif" opacity="0.8">' + card.nameEn + '</text>',
        '<text x="40" y="70" font-size="18" text-anchor="middle" fill="' + colors.primary + '" font-family="serif" font-weight="bold">' + card.id.replace(card.suit + '-', '') + '</text>',
        '<path d="M 50 ' + (height-80) + ' Q ' + (width/2) + ' ' + (height-120) + ' ' + (width-50) + ' ' + (height-80) + '" fill="none" stroke="' + colors.primary + '" stroke-width="2" opacity="0.4"/>',
        '<ellipse cx="' + (width/2) + '" cy="' + (height-70) + '" rx="50" ry="20" fill="' + colors.primary + '" opacity="0.1"/>',
        '</svg>'
      ].join('');

      return svg;
    }

    // 生成所有牌面
    function generateAllCards() {
      const progressContainer = document.getElementById('progressContainer');
      const progressText = document.getElementById('progressText');
      const progressFill = document.getElementById('progressFill');
      const preview = document.getElementById('preview');

      progressContainer.style.display = 'block';
      preview.innerHTML = '';
      generatedCards = {};

      tarotCards.forEach(function(card, idx) {
        setTimeout(function() {
          const svg = generateMuchaSVG(card);
          const blob = new Blob([svg], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);

          // 保存
          generatedCards[card.id] = {
            svg: svg,
            blob: blob,
            url: url,
            card: card
          };

          // 创建预览
          const div = document.createElement('div');
          div.className = 'card-item';

          const img = document.createElement('img');
          img.src = url;
          img.width = 120;
          img.height = 200;
          img.alt = card.name;

          const name = document.createElement('div');
          name.className = 'card-name';
          name.textContent = card.name;

          div.appendChild(img);
          div.appendChild(name);
          preview.appendChild(div);

          // 更新进度
          const progress = ((idx + 1) / tarotCards.length * 100).toFixed(0);
          progressText.textContent = '生成进度：' + (idx + 1) + '/' + tarotCards.length + ' (' + progress + '%)';
          progressFill.style.width = progress + '%';

          if (idx === tarotCards.length - 1) {
            progressText.textContent = '✅ 所有牌面生成完成！';
          }
        }, idx * 50);
      });
    }

    // 生成指定花色
    function generateSelectedSuit(suit) {
      const filtered = tarotCards.filter(function(c) { return c.suit === suit; });
      const progressContainer = document.getElementById('progressContainer');
      const progressText = document.getElementById('progressText');
      const progressFill = document.getElementById('progressFill');
      const preview = document.getElementById('preview');

      progressContainer.style.display = 'block';
      preview.innerHTML = '';
      generatedCards = {};

      filtered.forEach(function(card, idx) {
        setTimeout(function() {
          const svg = generateMuchaSVG(card);
          const blob = new Blob([svg], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);

          generatedCards[card.id] = {
            svg: svg,
            blob: blob,
            url: url,
            card: card
          };

          const div = document.createElement('div');
          div.className = 'card-item';

          const img = document.createElement('img');
          img.src = url;
          img.width = 120;
          img.height = 200;
          img.alt = card.name;

          const name = document.createElement('div');
          name.className = 'card-name';
          name.textContent = card.name;

          div.appendChild(img);
          div.appendChild(name);
          preview.appendChild(div);

          const progress = ((idx + 1) / filtered.length * 100).toFixed(0);
          progressText.textContent = '生成进度：' + (idx + 1) + '/' + filtered.length + ' (' + progress + '%)';
          progressFill.style.width = progress + '%';

          if (idx === filtered.length - 1) {
            progressText.textContent = '✅ ' + suit + ' 花色生成完成！';
          }
        }, idx * 100);
      });
    }

    // 下载所有图片
    function downloadAll() {
      const keys = Object.keys(generatedCards);
      if (keys.length === 0) {
        alert('请先生成牌面图片！');
        return;
      }

      keys.forEach(function(key, idx) {
        setTimeout(function() {
          const data = generatedCards[key];
          const a = document.createElement('a');
          a.href = data.url;
          a.download = 'tarot-' + key + '.svg';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          const progressText = document.getElementById('progressText');
          if (progressText) {
            progressText.textContent = '下载进度：' + (idx + 1) + '/' + keys.length;
          }
        }, idx * 200);
      });
    }
  </script>
