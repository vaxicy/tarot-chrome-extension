<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #D4AF37;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #D4AF37;
      margin-bottom: 30px;
    }
    .controls {
      margin-bottom: 30px;
    }
    button {
      background: linear-gradient(135deg, #D4AF37, #F0D68A);
      color: #1a1a2e;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 10px;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
    }
    .progress {
      color: #F0D68A;
      margin: 20px 0;
      font-size: 14px;
    }
    .card-preview {
      display: inline-block;
      margin: 10px;
      border: 2px solid #D4AF37;
      border-radius: 8px;
      overflow: hidden;
    }
    .info {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 8px;
      padding: 20px;
      margin: 20px auto;
      max-width: 800px;
      text-align: left;
      line-height: 1.6;
    }
    .info h3 {
      color: #F0D68A;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>🎨 穆夏风塔罗牌生成器</h1>

  <div class="info">

    <p>此工具会生成<strong>穆夏风格</strong>的塔罗牌占位符图片（SVG格式）。</p>
    <p>生成的图片包含：</p>
    <ul>

      <li>🌸 花卉植物图案</li>
      <li>💫 牌名和编号</li>
      <li>🎨 新艺术运动风格配色</li>
    </ul>
    <p><strong>下一步：</strong>你可以将这些占位符替换为真正的AI生成图片（使用下方提供的提示词）。</p>
  </div>

    <button onclick="downloadAll()">📥 下载所有图片</button>

  <div id="preview"></div>

  <script>

      { id: 18, name: "月亮", nameEn: "The Moon", suit: "major" },
      { id: 19, name: "太阳", nameEn: "The Sun", suit: "major" },
      { id: 20, name: "审判", nameEn: "Judgement", suit: "major" },
      { id: 21, name: "世界", nameEn: "The World", suit: "major" },
      // 小阿卡纳 - 权杖 Wands

      { id: "W2", name: "权杖二", nameEn: "Two of Wands", suit: "wands" },

      { id: "W6", name: "权杖六", nameEn: "Six of Wands", suit: "wands" },

      { id: "W14", name: "权杖国王", nameEn: "King of Wands", suit: "wands" },
      // 小阿卡纳 - 圣杯 Cups
      { id: "C1", name: "圣杯王牌", nameEn: "Ace of Cups", suit: "cups" },
      { id: "C2", name: "圣杯二", nameEn: "Two of Cups", suit: "cups" },
      { id: "C3", name: "圣杯三", nameEn: "Three of Cups", suit: "cups" },
      { id: "C4", name: "圣杯四", nameEn: "Four of Cups", suit: "cups" },
      { id: "C5", name: "圣杯五", nameEn: "Five of Cups", suit: "cups" },
      { id: "C6", name: "圣杯六", nameEn: "Six of Cups", suit: "cups" },
      { id: "C7", name: "圣杯七", nameEn: "Seven of Cups", suit: "cups" },
      { id: "C8", name: "圣杯八", nameEn: "Eight of Cups", suit: "cups" },
      { id: "C9", name: "圣杯九", nameEn: "Nine of Cups", suit: "cups" },
      { id: "C10", name: "圣杯十", nameEn: "Ten of Cups", suit: "cups" },
      { id: "C11", name: "圣杯侍从", nameEn: "Page of Cups", suit: "cups" },

      { id: "C14", name: "圣杯国王", nameEn: "King of Cups", suit: "cups" },
      // 小阿卡纳 - 宝剑 Swords
      { id: "S1", name: "宝剑王牌", nameEn: "Ace of Swords", suit: "swords" },
      { id: "S2", name: "宝剑二", nameEn: "Two of Swords", suit: "swords" },
      { id: "S3", name: "宝剑三", nameEn: "Three of Swords", suit: "swords" },
      { id: "S4", name: "宝剑四", nameEn: "Four of Swords", suit: "swords" },
      { id: "S5", name: "宝剑五", nameEn: "Five of Swords", suit: "swords" },
      { id: "S6", name: "宝剑六", nameEn: "Six of Swords", suit: "swords" },
      { id: "S7", name: "宝剑七", nameEn: "Seven of Swords", suit: "swords" },
      { id: "S8", name: "宝剑八", nameEn: "Eight of Swords", suit: "swords" },
      { id: "S9", name: "宝剑九", nameEn: "Nine of Swords", suit: "swords" },
      { id: "S10", name: "宝剑十", nameEn: "Ten of Swords", suit: "swords" },
      { id: "S11", name: "宝剑侍从", nameEn: "Page of Swords", suit: "swords" },
      { id: "S12", name: "宝剑骑士", nameEn: "Knight of Swords", suit: "swords" },
      { id: "S13", name: "宝剑王后", nameEn: "Queen of Swords", suit: "swords" },
      { id: "S14", name: "宝剑国王", nameEn: "King of Swords", suit: "swords" },
      // 小阿卡纳 - 星币 Pentacles
      { id: "P1", name: "星币王牌", nameEn: "Ace of Pentacles", suit: "pentacles" },
      { id: "P2", name: "星币二", nameEn: "Two of Pentacles", suit: "pentacles" },
      { id: "P3", name: "星币三", nameEn: "Three of Pentacles", suit: "pentacles" },
      { id: "P4", name: "星币四", nameEn: "Four of Pentacles", suit: "pentacles" },
      { id: "P5", name: "星币五", nameEn: "Five of Pentacles", suit: "pentacles" },
      { id: "P6", name: "星币六", nameEn: "Six of Pentacles", suit: "pentacles" },
      { id: "P7", name: "星币七", nameEn: "Seven of Pentacles", suit: "pentacles" },
      { id: "P8", name: "星币八", nameEn: "Eight of Pentacles", suit: "pentacles" },
      { id: "P9", name: "星币九", nameEn: "Nine of Pentacles", suit: "pentacles" },
      { id: "P10", name: "星币十", nameEn: "Ten of Pentacles", suit: "pentacles" },
      { id: "P11", name: "星币侍从", nameEn: "Page of Pentacles", suit: "pentacles" },
      { id: "P12", name: "星币骑士", nameEn: "Knight of Pentacles", suit: "pentacles" },
      { id: "P13", name: "星币王后", nameEn: "Queen of Pentacles", suit: "pentacles" },
      { id: "P14", name: "星币国王", nameEn: "King of Pentacles", suit: "pentacles" }
    ];

    // 花色颜色映射（穆夏风格配色）
    const suitColors = {
      major: { primary: '#D4AF37', secondary: '#F0D68A', bg: '#1a1a2e' },
      wands: { primary: '#EF4444', secondary: '#FCA5A5', bg: '#2d1a1a' },
      cups: { primary: '#3B82F6', secondary: '#93C5FD', bg: '#1a1a2d' },
      swords: { primary: '#F59E0B', secondary: '#FCD34D', bg: '#2d2a1a' },
      pentacles: { primary: '#10B981', secondary: '#6EE7B7', bg: '#1a2d1a' }
    };

    // 生成穆夏风格SVG
    function generateMuchaSVG(card) {
      const colors = suitColors[card.suit] || suitColors.major;
      const width = 200;
      const height = 350;

      // 穆夏风格装饰元素
      const muchaDecor = `
        <!-- 装饰边框 -->
        <rect x="10" y="10" width="${width-20}" height="${height-20}" rx="15"
              fill="none" stroke="${colors.primary}" stroke-width="3"
              opacity="0.8"/>

        <!-- 四角装饰 -->
        <circle cx="20" cy="20" r="8" fill="${colors.primary}" opacity="0.6"/>
        <circle cx="${width-20}" cy="20" r="8" fill="${colors.primary}" opacity="0.6"/>
        <circle cx="20" cy="${height-20}" r="8" fill="${colors.primary}" opacity="0.6"/>
        <circle cx="${width-20}" cy="${height-20}" r="8" fill="${colors.primary}" opacity="0.6"/>

        <!-- 顶部花卉装饰 -->
        <path d="M 50 ${50 + Math.sin(0) * 20}" fill="none" stroke="${colors.secondary}" stroke-width="2" opacity="0.5"/>
        <ellipse cx="${width/2}" cy="60" rx="30" ry="15"
                 fill="${colors.primary}" opacity="0.2"/>
        <ellipse cx="${width/2 - 20}" cy="50" rx="15" ry="10"
                 fill="${colors.secondary}" opacity="0.3"/>
        <ellipse cx="${width/2 + 20}" cy="50" rx="15" ry="10"
                 fill="${colors.secondary}" opacity="0.3"/>

        <!-- 底部装饰花纹 -->
        <path d="M 30 ${height-60} Q ${width/2} ${height-100}, ${width-30} ${height-60}"
              fill="none" stroke="${colors.primary}" stroke-width="2" opacity="0.5"/>
        <ellipse cx="${width/2}" cy="${height-50}" rx="40" ry="20"
                 fill="${colors.primary}" opacity="0.15"/>
      `;

      // 中央符号
      const symbol = getCardSymbol(card);

      return `<?xml version="1.0" encoding="UTF-8"?>
        <svg width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bg-${card.id}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:${colors.bg};stop-opacity:1" />
              <stop offset="100%" style="stop-color:${colors.primary};stop-opacity:0.3" />
            </linearGradient>
          </defs>

          <!-- 背景 -->
          <rect width="${width}" height="${height}" fill="url(#bg-${card.id})" rx="15"/>

          ${muchaDecor}

          <!-- 牌名 -->
          <text x="${width/2}" y="${height - 30}"
                font-family="'Times New Roman', serif"
                font-size="16" font-weight="bold"
                fill="${colors.primary}" text-anchor="middle">
            ${card.name}
          </text>

          <!-- 英文名 -->
          <text x="${width/2}" y="${height - 10}"
                font-family="serif"
                font-size="10"
                fill="${colors.secondary}" text-anchor="middle" opacity="0.8">
            ${card.nameEn}
          </text>

          <!-- 中央符号 -->
          ${symbol}

          <!-- 编号 -->
          <text x="30" y="40"
                font-family="serif"
                font-size="20" font-weight="bold"
                fill="${colors.primary}" text-anchor="middle">
            ${card.id}
          </text>
        </svg>`;
    }

    // 获取牌面对应符号
    function getCardSymbol(card) {
      const colors = suitColors[card.suit] || suitColors.major;
      const cx = 100;
      const cy = 150;

      if (card.suit === 'major') {
        // 大阿卡纳：使用占星符号
        const symbols = ['☀', '☿', '☽', '♀', '♂', '♃', '♄', '♅', '♆', '♇', '♈', '♉', '♊', '♋', '♌', '♍', '♎', '♏', '♐', '♑', '♒', '♓'];
        const symbol = symbols[card.id] || '★';
        return `<text x="${cx}" y="${cy}" font-size="80" text-anchor="middle" fill="${colors.primary}" opacity="0.6">${symbol}</text>`;
      } else {
        // 小阿卡纳：使用花色符号
        const suitSymbols = { wands: '🔥', cups: '💧', swords: '💨', pentacles: '🌍' };
        const symbol = suitSymbols[card.suit] || '●';
        return `<text x="${cx}" y="${cy}" font-size="60" text-anchor="middle" fill="${colors.primary}" opacity="0.6">${symbol}</text>`;
      }
    }

    // 生成所有牌面
    function generateAllCards() {
      const progress = document.getElementById('progress');
      const preview = document.getElementById('preview');
      preview.innerHTML = '';

      tarotCards.forEach((card, idx) => {
        setTimeout(() => {
          const svg = generateMuchaSVG(card);
          const blob = new Blob([svg], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);

          // 创建预览
          const img = document.createElement('img');
          img.src = url;
          img.className = 'card-preview';
          img.style.width = '100px';
          img.style.height = '175px';
          img.title = card.name;

          preview.appendChild(img);

          // 保存到全局变量
          window['card_' + card.id] = { svg: svg, blob: blob, url: url, card: card };

          progress.textContent = `生成进度：${idx + 1}/${tarotCards.length}`;

          if (idx === tarotCards.length - 1) {
            progress.textContent = '✅ 所有牌面生成完成！';
          }
        }, idx * 50);
      });
    }

    // 下载所有图片
    function downloadAll() {
      tarotCards.forEach((card, idx) => {
        setTimeout(() => {
          const data = window['card_' + card.id];
          if (!data) return;

          const a = document.createElement('a');
          a.href = data.url;
          a.download = `mucha-${card.suit}-${card.id}.svg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);

          document.getElementById('progress').textContent = `下载进度：${idx + 1}/${tarotCards.length}`;
      }, idx * 100);
      });
    }
  </script>
</body>
</html>
